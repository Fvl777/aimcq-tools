<!-- =====================================================================
     AI MCQs JSON Tool — embed snippet (any website)
     Replace USER / REPO / VERSION with your GitHub details, e.g.
       USER     = your GitHub username
       REPO     = the repo you push the 3 files to
       VERSION  = a release tag or commit, e.g. v1.0  (use a tag, not "main",
                  so jsDelivr caches a fixed version and updates are predictable)
     ===================================================================== -->

<div class="mcqs-page-wrap">
  <div id="mcqs-host" data-height="auto"></div>
</div>

<!-- The loader auto-loads mcqs-core.js + mcqs-tool.css from the SAME folder,
     and injects every third-party library the tool needs. One URL is all
     you reference. Place it after the host div (or in <head> — both work). -->
<script src="https://cdn.jsdelivr.net/gh/USER/REPO@VERSION/mcqs-tool.js"></script>
